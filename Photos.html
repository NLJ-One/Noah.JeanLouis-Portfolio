    <script>
        // Optimized Lightbox with lazy loading for full-size photos
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const galleryImages = document.querySelectorAll('.photos-gallery img');
        let currentImageIndex = 0;

        // Preload images on hover for smoother UX
        galleryImages.forEach((img, index) => {
            img.addEventListener('mouseenter', () => {
                const fullSrc = img.dataset.full;
                const link = document.createElement('link');
                link.rel = 'prefetch';
                link.as = 'image';
                link.href = fullSrc;
                document.head.appendChild(link);
            });

            img.addEventListener('click', () => {
                currentImageIndex = index;
                const fullSrc = img.dataset.full;
                lightboxImg.src = fullSrc;
                lightbox.classList.add('active');
            });
        });

        document.querySelector('.close').addEventListener('click', () => {
            lightbox.classList.remove('active');
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            currentImageIndex = (currentImageIndex + 1) % galleryImages.length;
            const fullSrc = galleryImages[currentImageIndex].dataset.full;
            lightboxImg.src = fullSrc;
        });

        document.getElementById('prev-btn').addEventListener('click', () => {
            currentImageIndex = (currentImageIndex - 1 + galleryImages.length) % galleryImages.length;
            const fullSrc = galleryImages[currentImageIndex].dataset.full;
            lightboxImg.src = fullSrc;
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                lightbox.classList.remove('active');
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            
            if (e.key === 'ArrowRight') {
                document.getElementById('next-btn').click();
            } else if (e.key === 'ArrowLeft') {
                document.getElementById('prev-btn').click();
            } else if (e.key === 'Escape') {
                document.querySelector('.close').click();
            }
        });
    </script>
